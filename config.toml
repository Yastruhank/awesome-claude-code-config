# Codex configuration template

model = "gpt-5.4"
model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "live"
model_instructions_file = "lessons.md"

[shell_environment_policy]
inherit = "all"

[mcp_servers.lark-mcp]
command = "npx"
args = ["-y", "@larksuiteoapi/lark-mcp", "mcp", "-a", "YOUR_APP_ID", "-s", "YOUR_APP_SECRET"]
startup_timeout_sec = 30

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
startup_timeout_sec = 30

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
startup_timeout_sec = 30

[mcp_servers.github.env]
GITHUB_PERSONAL_ACCESS_TOKEN = "YOUR_GITHUB_PAT"

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]
startup_timeout_sec = 30

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[features]
multi_agent = true

[agents]
max_threads = 4
max_depth = 1

[agents.explorer]
description = "Scans code paths and summarizes findings"
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "Reviews diffs for bugs, regressions, and missing tests"
config_file = "agents/reviewer.toml"

[agents.docs_researcher]
description = "Researches docs and API usage via OpenAI docs MCP/context7"
config_file = "agents/docs-researcher.toml"
